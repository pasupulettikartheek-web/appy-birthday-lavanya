<!-- ADD THIS RIGHT AFTER <body> -->

<div id="giftIntro">
  <div class="giftBox" onclick="openGift()">🎁</div>
  <p class="tapText">Tap to open</p>
</div>

<style>
#giftIntro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.giftBox {
  font-size:80px;
  cursor:pointer;
  animation:float 2s infinite;
}

.tapText {
  margin-top:15px;
  opacity:0.8;
}

@keyframes float {
  0%,100% {transform:translateY(0);}
  50% {transform:translateY(-15px);}
}
</style>

<script>
function openGift(){
  const intro = document.getElementById("giftIntro");

  intro.style.opacity = "0";

  setTimeout(()=>{
    intro.style.display = "none";
    document.getElementById('bgMusic')?.play().catch(()=>{});
  },800);
}
</script>
